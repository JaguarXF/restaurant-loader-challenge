<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MR D Restaurants List</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Tip: see a solution demonstrated https://youtu.be/nluEqXetQLs  -->

      <h2>Welcome to the MR D Restaurants List!</h2>
      <p>List of restuarants in our catalogue.</p>

      <div class="restaurants-section">
        <div class="restaurants-controls">
          <button id="loadDataBtn">View Catalogue</button>
          <div id="restaurantProgress" class="progress-container hidden">
            <div class="progress-bar-track">
              <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            <span id="progressLabel">0 / 0</span>
          </div>
        </div>
        <div class="restuarants-list"></div>
      </div>

      <!-- TODO: create a grid to display restaurant details -->
      <table>
        <thead>
          <tr>
            <th><!-- Title --></th>
            <!-- displays the restaurant name -->
            <th><!-- Location --></th>
            <!-- displays the province the restaurant is located in -->
            <th><!-- Logo --></th>
            <!-- display a small <img> -->
            <th><!-- Sections --></th>
            <!-- (Part 2: Bonus) display the number of sections each restaurant menu has -->
          </tr>
        </thead>
        <tbody>
          <!-- Rows will be dynamically inserted and update -->
        </tbody>
      </table>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
